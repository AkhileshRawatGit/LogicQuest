version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: student-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: studentdb
      MYSQL_USER: student
      MYSQL_PASSWORD: student123
    ports:
      - "3307:3306"
    networks:
      - a-network
    volumes:
      - mysql-s-data:/var/lib/mysql

  app:
    build: .
    container_name: student-app
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/studentdb?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: student
      SPRING_DATASOURCE_PASSWORD: student123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - a-network


networks:
  a-network:
    driver: bridge
volumes:
  mysql-s-data:
    name: student-mysql-data